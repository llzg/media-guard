interface: ovs_eth1
interval: 1
trigger: 2.0
recover: 0.3
trigger_count: 2
recover_count: 60
connection_hold_seconds: 300

connection:
  enable: true
  immediate_limit: true
  # 监控 16666 端口的公网连接 → 有人访问 Immich/MT Photos 就限速
  monitor_local_ports: [16666]
  ignore_remote_ports: [22, 51413]
  ignore_local_ports: []

bandwidth_fallback:
  enable: false
  # 如果 monitor_local_ports 没检测到连接，但上传带宽持续超限也触发

qb:
  enable: true
  url: http://192.168.5.202:8080
  user: admin
  pass: equpODdcE50ydK
  limit: 1024
  normal: 0

tr:
  enable: true
  host: 192.168.5.203
