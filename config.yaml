interface: ovs_eth1
interval: 1
trigger: 2.0
recover: 0.3
trigger_count: 2
recover_count: 60
connection_hold_seconds: 60

connection:
  enable: true
  immediate_limit: true
  ignore_remote_ports: [22]

qb:
  enable: true
  url: http://192.168.5.202:8080
  user: YOUR_QB_USER
  pass: YOUR_QB_PASSWORD
  limit: 5120
  normal: 0

tr:
  enable: false
  host: 127.0.0.1
  port: 9091
  user: YOUR_TR_USER
  pass: YOUR_TR_PASSWORD
  limit: 1024
  normal: 0

notify:
  enable: false
  mode: wechat_robot
  webhook: ""
