interface: ovs_eth1
interval: 1
trigger: 2.0
recover: 0.3
trigger_count: 2
recover_count: 60
connection_hold_seconds: 60

connection:
  enable: true
  immediate_limit: true
  ignore_remote_ports: [22]

qb:
  enable: true
  url: http://192.168.5.202:8080
  user: admin
  pass: adminadmin          # ← 改你的 qB 密码
  limit: 5120
  normal: 0

tr:
  enable: true
  host: 192.168.5.203
  port: 9091
  user: admin
  pass: admin               # ← 改你的 TR 密码
  limit: 1024
  normal: 0

notify:
  enable: false
  mode: wechat_robot
  webhook: ""
