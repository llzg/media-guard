interface: eth0
interval: 1
trigger: 0.5
recover: 0.2
trigger_count: 2
recover_count: 60
log_hold_seconds: 60

qb:
  enable: true
  url: http://127.0.0.1:8080
  user: admin
  pass: admin
  limit: 1024
  normal: 0

tr:
  enable: true
  host: 127.0.0.1
  port: 9091
  user: admin
  pass: admin
  limit: 1024
  normal: 0

lucky:
  enable: true
  logs:
    - /lucky/logs/access.log
  keywords:
    immich:
      - immich
    mtphotos:
      - mtphotos
  ignore_keywords:
    - health
    - ping

notify:
  enable: false
  mode: wechat_robot
  webhook: ""
