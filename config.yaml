# ──────────────────────────────────────────────────────────────
# media-guard 配置
# ──────────────────────────────────────────────────────────────

server:
  host: 0.0.0.0
  port: 5000
  debug: false       # 生产环境关闭 debug

modbus:
  timeout: 5         # Modbus TCP 连接超时（秒）
  retries: 3         # 读取失败重试次数

trend:
  max_points: 200    # 趋势图每个标签最多点数
  poll_interval: 1.0 # 轮询间隔（秒）
